name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features --locked -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Build portable release executable
        run: npm run tauri build -- --ci --no-bundle -- --locked

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $exe = Resolve-Path 'src-tauri/target/release/remember.exe'
          $hash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  remember.exe" | Set-Content -LiteralPath 'src-tauri/target/release/remember.exe.sha256' -Encoding ascii

      - name: Upload unsigned release candidate
        uses: actions/upload-artifact@v4
        with:
          name: remember-windows-unsigned
          path: |
            src-tauri/target/release/remember.exe
            src-tauri/target/release/remember.exe.sha256
          if-no-files-found: error
